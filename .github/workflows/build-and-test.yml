name: Build + Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - 'gails/**'
      - '.github/workflows/build-and-test.yml'
  pull_request_review:
    types: [submitted]
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

# Pin every JavaScript action in this workflow to the Node.js 24 runtime.
# GitHub Actions defaults to Node 20 for action execution and will force-
# upgrade to Node 24 on 2026-06-16. Opting in early silences the per-step
# "Node.js 20 actions are deprecated" warning without waiting for the cut-
# over, and keeps behaviour consistent across runner images.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_js:
    name: Run JS Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-runtime-${{ hashFiles('gails/internal/runtime/desktop/@gailsio/runtime/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-runtime-

      - name: Install dependencies
        working-directory: gails/internal/runtime/desktop/@gailsio/runtime
        run: |
          npm ci
          npx --yes esbuild@latest --version

      - name: Clean build artifacts
        working-directory: gails/internal/runtime/desktop/@gailsio/runtime
        run: npm run clean

      - name: Type-check runtime
        working-directory: gails
        run: task runtime:check

      - name: Test runtime
        working-directory: gails
        run: task runtime:test

      - name: Check that the bundled runtime builds
        working-directory: gails
        run: task runtime:build

      - name: Check that the npm package builds
        working-directory: gails/internal/runtime/desktop/@gailsio/runtime
        run: npm run build

      - name: Pack runtime for template tests
        working-directory: gails/internal/runtime/desktop/@gailsio/runtime
        run: npm pack

      - name: Store runtime build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-build-artifacts
          path: |
            gails/internal/runtime/desktop/@gailsio/runtime/dist/
            gails/internal/runtime/desktop/@gailsio/runtime/types/
            gails/internal/runtime/desktop/@gailsio/runtime/tsconfig.tsbuildinfo
          retention-days: 7

      - name: Store runtime package
        uses: actions/upload-artifact@v4
        with:
          name: runtime-package
          path: gails/internal/runtime/desktop/@gailsio/runtime/*.tgz
          retention-days: 7

  test_go:
    name: Run Go Tests
    needs: [test_js]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    timeout-minutes: 25
    env:
      GOWORK: "off"
      JOBS: 4
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        go-version: [1.26]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install linux dependencies (GTK4 default)
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev libwayland-dev build-essential pkg-config xvfb x11-xserver-utils at-spi2-core xdg-desktop-portal-gtk
          version: 1.0

      - name: Install linux dependencies (GTK3 legacy)
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: "gails/go.sum"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Retrieve runtime build artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-build-artifacts
          path: gails/internal/runtime/desktop/@gailsio/runtime/

      - name: Verify runtime artifacts downloaded correctly
        shell: bash
        run: |
          RUNTIME_DIR="gails/internal/runtime/desktop/@gailsio/runtime"
          if [ ! -d "$RUNTIME_DIR/dist" ] || [ ! -d "$RUNTIME_DIR/types" ]; then
            echo "Warning: Runtime artifacts not found or incomplete"
            ls -la "$RUNTIME_DIR" 2>/dev/null || echo "Directory empty"
          else
            echo "✅ Runtime artifacts verified"
          fi

      - name: Prepare example frontend dist stubs
        working-directory: gails
        shell: bash
        run: |
          STUB_HTML='<!doctype html><html><body>stub</body></html>'
          find examples -type d -name frontend | while read -r dir; do
            mkdir -p "$dir/dist"
            echo "$STUB_HTML" > "$dir/dist/index.html"
          done
          echo "✅ Frontend stubs created"

      - name: Run tests (macOS)
        if: matrix.os == 'macos-latest'
        env:
          CGO_ENABLED: 1
          CGO_LDFLAGS: -framework UniformTypeIdentifiers -framework WebKit -framework Cocoa -framework CoreFoundation -mmacosx-version-min=10.13
          CGO_CFLAGS: -mmacosx-version-min=10.13
          MACOSX_DEPLOYMENT_TARGET: 10.13
        working-directory: gails
        run: |
          echo "Running Go tests on macOS..."
          echo "Go version: $(go version)"
          echo "CGO_ENABLED: $(go env CGO_ENABLED)"
          go test -v -timeout 10m -skip "TestGUI|TestWindow|TestDialog" ./...

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        working-directory: gails
        run: |
          echo "Running Go tests on Windows..."
          go test -v -timeout 10m ./...

      - name: Run tests (Ubuntu) - GTK4 default
        if: matrix.os == 'ubuntu-latest'
        working-directory: gails
        run: |
          echo "Running GTK4 tests on Ubuntu..."
          dbus-run-session -- xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" \
            go test -v -timeout 10m -skip "TestService" ./...

      - name: Run tests (Ubuntu) - GTK3 legacy
        if: matrix.os == 'ubuntu-latest'
        working-directory: gails
        run: |
          echo "Running GTK3 legacy tests on Ubuntu..."
          dbus-run-session -- xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" \
            go test -tags gtk3 -v -timeout 10m ./...

      - name: Typecheck binding generator output
        working-directory: gails
        run: |
          echo "Typechecking binding generator output..."
          task generator:test:check

  cleanup:
    name: Cleanup build artifacts
    if: always()
    needs: [test_js, test_go]
    runs-on: ubuntu-latest
    steps:
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            runtime-build-artifacts
            runtime-package
          failOnError: false

  test_templates:
    name: Test Templates
    needs: [test_js]
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    timeout-minutes: 20
    env:
      GOWORK: "off"
    strategy:
      fail-fast: true
      max-parallel: 6
      matrix:
        os: [ubuntu-latest]
        template:
          - svelte
          - svelte-ts
          - vue
          - vue-ts
          - react
          - react-ts
          - preact
          - preact-ts
          - lit
          - lit-ts
          - vanilla
          - vanilla-ts
        go-version: [1.26]
        include:
          - os: windows-latest
            template: react
            go-version: 1.26
          - os: macos-latest
            template: react
            go-version: 1.26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install linux dependencies (GTK4 default)
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev libwayland-dev build-essential pkg-config xvfb x11-xserver-utils
          version: 1.0

      - name: Install linux dependencies (GTK3 legacy)
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: matrix.os == 'ubuntu-latest'
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: "gails/go.sum"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build gails CLI
        working-directory: gails
        run: |
          task install
          gails doctor

      - name: Download runtime package
        uses: actions/download-artifact@v4
        with:
          name: runtime-package
          path: gails-runtime-temp

      - name: Verify runtime package exists
        shell: bash
        run: |
          if [ ! -f gails-runtime-temp/*.tgz ]; then
            echo "Error: runtime-package artifact not found or empty"
            ls -la gails-runtime-temp/ 2>/dev/null || echo "Directory empty"
            exit 1
          fi
          echo "✅ Runtime package found: $(ls gails-runtime-temp/*.tgz)"

      - name: Generate and build template '${{ matrix.template }}'
        # WAILS_USE_WAKE=true routes the gails build through the embedded
        # Go-native Taskfile executor (wake) instead of the external `task`
        # CLI installed by arduino/setup-task. wake is the executor shipped
        # with this repo, so its template expansion (e.g. `{{.OS}}` inside
        # `preconditions: sh:`) matches the source tree; the external CLI
        # on the CI runner doesn't always expand these correctly, which
        # spuriously fails the `darwin:build:native` precondition on the
        # macOS host.
        env:
          WAILS_USE_WAKE: 'true'
        shell: bash
        run: |
          RUNTIME_TGZ_FILE=$(ls gails-runtime-temp/*.tgz | head -1)
          
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # On Windows, npm mis-parses file:///D:/... URLs (treats D: as
            # host and drops the intermediate path segments). Hand it a
            # plain absolute Windows path instead — npm accepts that as a
            # local tarball source on Windows runners.
            WIN_PATH=$(cygpath -w "$(pwd)/$RUNTIME_TGZ_FILE")
            RUNTIME_TGZ_URL="$WIN_PATH"
          else
            RUNTIME_TGZ_URL="file://$(pwd)/$RUNTIME_TGZ_FILE"
          fi
          
          PROJECT_NAME="test-${{ matrix.template }}"
          mkdir -p "$PROJECT_NAME"
          cd "$PROJECT_NAME"
          
          echo "Initializing template: ${{ matrix.template }}"
          gails init -n "$PROJECT_NAME" -t "${{ matrix.template }}"
          
          # `gails init` chdir's its own child process to the newly created
          # project directory ($PROJECT_NAME/$PROJECT_NAME), but that has no
          # effect on this shell's cwd. Re-align explicitly so subsequent
          # commands run from the project root.
          cd "$PROJECT_NAME"
          
          cd frontend
          echo "Replacing runtime dependency with local tarball"
          npm pkg set dependencies.@gailsio/runtime="$RUNTIME_TGZ_URL"
          
          cd ..
          echo "Building project..."
          gails build
          
          echo "✅ Template ${{ matrix.template }} built successfully on ${{ runner.os }}"

      - name: Test GTK3 legacy (Linux only)
        if: matrix.os == 'ubuntu-latest' && matrix.template == 'react'
        env:
          WAILS_USE_WAKE: 'true'
        shell: bash
        run: |
          # Re-anchor to the job workspace root before referencing
          # ../gails-runtime-temp: the previous step ended inside the
          # freshly initialised project tree, so a bare `..` would land in
          # the wrong place.
          cd "$GITHUB_WORKSPACE"
          
          PROJECT_NAME="test-gtk3-${{ matrix.template }}"
          RUNTIME_TGZ_FILE=$(ls gails-runtime-temp/*.tgz | head -1)
          RUNTIME_TGZ_URL="file://$(pwd)/$RUNTIME_TGZ_FILE"
          
          mkdir -p "$PROJECT_NAME"
          cd "$PROJECT_NAME"
          
          gails init -n "$PROJECT_NAME" -t "${{ matrix.template }}"
          # See the matching comment in the main build step above: the init
          # child's chdir doesn't propagate to this shell.
          cd "$PROJECT_NAME"
          cd frontend
          npm pkg set dependencies.@gailsio/runtime="$RUNTIME_TGZ_URL"
          cd ..
          
          BUILD_TAGS=gtk3 gails build
          echo "✅ GTK3 legacy build successful for ${{ matrix.template }}"

  build_results:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Build Results
    needs: [test_go, test_js, test_templates]
    steps:
      - run: |
          go_result="${{ needs.test_go.result }}"
          js_result="${{ needs.test_js.result }}"
          templates_result="${{ needs.test_templates.result }}"
          
          echo "Test Results:"
          echo "  Go Tests: $go_result"
          echo "  JS Tests: $js_result"
          echo "  Template Tests: $templates_result"
          
          if [[ $go_result == "success" || $go_result == "skipped" ]] && \
             [[ $js_result == "success" || $js_result == "skipped" ]] && \
             [[ $templates_result == "success" || $templates_result == "skipped" ]]; then
            echo "✅ All required jobs succeeded or were skipped"
            exit 0
          else
            echo "❌ One or more required jobs failed"
            exit 1
          fi